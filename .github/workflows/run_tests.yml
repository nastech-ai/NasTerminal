name: Unit tests

on:
  push:
    branches:
      - master
      - main
      - android-10
  pull_request:
    branches:
      - master
      - main
      - android-10
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  testing:
    name: Unit Tests (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [ app, termux-shared, terminal-emulator, terminal-view ]

    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Execute tests — ${{ matrix.module }}
        shell: bash
        run: |
          echo "Running tests for module: ${{ matrix.module }}"
          if [ -d "${{ matrix.module }}/src/test" ] || \
             find "${{ matrix.module }}" -name "*Test*.java" -o -name "*Test*.kt" 2>/dev/null | grep -q .; then
            ./gradlew ":${{ matrix.module }}:test" --continue 2>&1
          else
            echo "No tests found in ${{ matrix.module }} — skipping"
          fi

      - name: Publish Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.module }}
          path: |
            ${{ matrix.module }}/build/test-results/**/*.xml
            ${{ matrix.module }}/build/reports/tests/**

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: testing
    if: always()
    steps:
      - name: Summarize Results
        run: |
          echo "## Test Matrix Complete"
          echo "All module tests have finished."
          echo "Check individual job logs for per-module results."
