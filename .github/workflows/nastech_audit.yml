name: NasTech Audit — Dependency & Security Deep Scan

on:
  push:
    branches: [ master, main ]
  schedule:
    - cron: '0 3 * * 1'   # Weekly Monday 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  security-events: write

jobs:
  # ──────────────────────────────────────────────
  # GRADLE DEPENDENCY AUDIT
  # ──────────────────────────────────────────────
  gradle-audit:
    name: Gradle Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}

      - name: Full Dependency Tree
        shell: bash
        run: |
          echo "# NasTech Dependency Audit — $(date -u)" > audit_report.md
          echo "" >> audit_report.md

          echo "## Full Dependency Tree" >> audit_report.md
          echo '```' >> audit_report.md
          ./gradlew :app:dependencies 2>&1 >> audit_report.md || true
          echo '```' >> audit_report.md

          echo "## Dependency Insights" >> audit_report.md

          # Detect version conflicts
          echo "### Version Conflicts" >> audit_report.md
          ./gradlew :app:dependencies 2>&1 \
            | grep -E "\->" \
            | grep -v "^$" \
            | sort -u >> audit_report.md || echo "None detected" >> audit_report.md

          # Detect SNAPSHOT / RC versions in use
          echo "### Unstable Versions (SNAPSHOT/RC/alpha/beta)" >> audit_report.md
          grep -rE "(SNAPSHOT|\.RC|\.alpha|\.beta|-rc|-alpha|-beta)" \
            app/build.gradle terminal-view/build.gradle \
            termux-shared/build.gradle terminal-emulator/build.gradle 2>/dev/null \
            >> audit_report.md || echo "None found" >> audit_report.md

          # Unused dependency candidates (imports not found)
          echo "### Declared Dependencies vs. Import Usage" >> audit_report.md
          while IFS= read -r dep; do
            ARTIFACT=$(echo "$dep" | sed 's/.*implementation\s*"//;s/:.*//')
            CLASS_HINT=$(echo "$ARTIFACT" | tr '.' '/' | sed 's|.*\/||')
            if [ -n "$CLASS_HINT" ]; then
              COUNT=$(grep -rl "$CLASS_HINT" app/src/ 2>/dev/null | wc -l)
              echo "  $dep → $COUNT source files reference $CLASS_HINT" >> audit_report.md
            fi
          done < <(grep 'implementation "' app/build.gradle | grep -v "//" | head -20)

      - name: Upload Audit Report
        uses: actions/upload-artifact@v4
        with:
          name: gradle-audit-report
          path: audit_report.md

  # ──────────────────────────────────────────────
  # CIRCULAR DEPENDENCY DETECTION
  # ──────────────────────────────────────────────
  circular-deps:
    name: Circular Dependency Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run Dependency Graph Analyzer
        shell: bash
        run: |
          python3 scripts/dependency_graph.py --report circular_deps_report.md 2>&1 || true

      - name: Upload Circular Dep Report
        uses: actions/upload-artifact@v4
        with:
          name: circular-deps-report
          path: circular_deps_report.md

  # ──────────────────────────────────────────────
  # PACKAGING & RELEASE AUDIT
  # ──────────────────────────────────────────────
  packaging-audit:
    name: Packaging & Release Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Packaging Check
        shell: bash
        run: |
          echo "# Packaging & Release Audit" > packaging_report.md
          FAIL=0

          echo "## Version Validation" >> packaging_report.md
          VERSION=$(grep 'versionName' app/build.gradle | grep -v "//" | head -1 | sed 's/.*versionName "\(.*\)".*/\1/')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle | grep -v "//" | head -1 | grep -o '[0-9]*')
          echo "  versionName: $VERSION" >> packaging_report.md
          echo "  versionCode: $VERSION_CODE" >> packaging_report.md

          # Semver check
          if echo "$VERSION" | grep -qP '^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)'; then
            echo "✅ versionName is valid semver" >> packaging_report.md
          else
            echo "❌ versionName '$VERSION' is not valid semver" >> packaging_report.md
            FAIL=1
          fi

          echo "## Release Workflow Check" >> packaging_report.md
          if [ -f ".github/workflows/debug_build.yml" ]; then
            echo "✅ Build workflow present" >> packaging_report.md
          else
            echo "❌ Build workflow missing" >> packaging_report.md
            FAIL=1
          fi

          echo "## APK Split Configuration" >> packaging_report.md
          if grep -q "universalApk true" app/build.gradle; then
            echo "✅ Universal APK enabled" >> packaging_report.md
          else
            echo "⚠️  Universal APK not enabled" >> packaging_report.md
          fi

          echo "## ProGuard / Minification" >> packaging_report.md
          if grep -q "minifyEnabled true" app/build.gradle; then
            echo "✅ Release minification enabled" >> packaging_report.md
          else
            echo "⚠️  minifyEnabled not set to true for release" >> packaging_report.md
          fi

          echo "## JitPack Configuration" >> packaging_report.md
          if [ -f "jitpack.yml" ]; then
            echo "✅ jitpack.yml present" >> packaging_report.md
            cat jitpack.yml >> packaging_report.md
          else
            echo "⚠️  jitpack.yml missing" >> packaging_report.md
          fi

          echo "## Bootstrap Checksums" >> packaging_report.md
          if grep -q "downloadBootstrap" app/build.gradle; then
            CHECKSUM_COUNT=$(grep -c '"[a-f0-9]\{64\}"' app/build.gradle || echo 0)
            echo "✅ $CHECKSUM_COUNT SHA-256 bootstrap checksums present" >> packaging_report.md
          fi

          cat packaging_report.md
          exit $FAIL

      - name: Upload Packaging Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: packaging-report
          path: packaging_report.md

  # ──────────────────────────────────────────────
  # ENVIRONMENT VARIABLE AUDIT
  # ──────────────────────────────────────────────
  env-audit:
    name: Environment Variable Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for Required Env Vars
        shell: bash
        run: |
          echo "# Environment Variable Audit" > env_report.md

          echo "## Env Vars Used in Workflows" >> env_report.md
          grep -rh "env\." .github/workflows/ 2>/dev/null \
            | grep -oE 'env\.[A-Z_]+' | sort -u >> env_report.md || true

          echo "## Env Vars Used in Build Scripts" >> env_report.md
          grep -rh 'System\.getenv' app/build.gradle terminal-view/build.gradle \
            termux-shared/build.gradle build.gradle 2>/dev/null \
            | grep -oE '"[A-Z_]+"' | sort -u >> env_report.md || true

          echo "## Secrets Referenced in Workflows" >> env_report.md
          grep -rh "secrets\." .github/workflows/ 2>/dev/null \
            | grep -oE 'secrets\.[A-Z_]+' | sort -u >> env_report.md || true

          echo "## Required Secrets for Deployment" >> env_report.md
          cat >> env_report.md << 'EOF'
          - secrets.GITHUB_TOKEN (auto-provided by GitHub Actions)
          - No additional secrets required for debug builds
          - For signed release builds: KEYSTORE_FILE, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD
          EOF

          cat env_report.md

      - name: Upload Env Report
        uses: actions/upload-artifact@v4
        with:
          name: env-audit-report
          path: env_report.md
