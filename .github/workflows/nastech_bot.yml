name: NasTech Bot — PR Review & Daily Digest

on:
  pull_request:
    types: [ opened, synchronize, reopened ]
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action: test | digest'
        required: false
        default: 'test'
  schedule:
    - cron: '0 9 * * *'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # ──────────────────────────────────────────────
  # QUICK STATIC ANALYSIS  (fast, no build needed)
  # ──────────────────────────────────────────────
  quick-analysis:
    name: Quick Static Analysis
    runs-on: ubuntu-latest
    outputs:
      findings: ${{ steps.analyze.outputs.findings }}
      fixes: ${{ steps.analyze.outputs.fixes }}
      severity: ${{ steps.analyze.outputs.severity }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Analyze Changed Files
        id: analyze
        shell: bash
        run: |
          FINDINGS=""
          FIXES=""
          SEVERITY="pass"

          # Get changed files
          BASE="${{ github.base_ref }}"
          git fetch origin "$BASE" --depth=1 2>/dev/null || true
          CHANGED=$(git diff --name-only "origin/$BASE...HEAD" 2>/dev/null || git diff --name-only HEAD~1 || true)

          echo "Changed files:" >> analysis.md
          echo "$CHANGED" >> analysis.md
          echo "" >> analysis.md

          # ── Check each changed .gradle file ──
          while IFS= read -r file; do
            if [[ "$file" == *.gradle ]]; then
              echo "### Gradle: $file" >> analysis.md

              # Check for hardcoded versions that should use variables
              if grep -q '"[0-9]\+\.[0-9]\+\.' "$file" 2>/dev/null; then
                echo "ℹ️  Hardcoded dependency versions found — consider using version catalog" >> analysis.md
              fi

              # Detect deprecated configurations
              if grep -q "compile\s\|provided\s\|apk\s" "$file" 2>/dev/null; then
                FINDINGS="$FINDINGS\n- **$file**: Deprecated Gradle configurations (compile/provided/apk) — use implementation/compileOnly/runtimeOnly"
                FIXES="$FIXES\n- Replace \`compile\` with \`implementation\` in \`$file\`"
                SEVERITY="warn"
              fi

              # Check for snapshot dependencies
              if grep -iE "SNAPSHOT|-alpha|-beta|-rc" "$file" 2>/dev/null | grep -v "//"; then
                FINDINGS="$FINDINGS\n- **$file**: Unstable dependency version (SNAPSHOT/alpha/beta/rc)"
                FIXES="$FIXES\n- Pin unstable versions to a stable release in \`$file\`"
                SEVERITY="warn"
              fi
            fi

            # ── Java/Kotlin source checks ──
            if [[ "$file" == *.java ]] || [[ "$file" == *.kt ]]; then
              if [ -f "$file" ]; then
                echo "### Source: $file" >> analysis.md

                # Log/printStackTrace in production code
                if grep -n "e\.printStackTrace\|System\.out\.print" "$file" 2>/dev/null | grep -v "//"; then
                  FINDINGS="$FINDINGS\n- **$file**: \`printStackTrace()\` / \`System.out\` in production — use Android \`Log\`"
                  FIXES="$FIXES\n- Replace \`e.printStackTrace()\` with \`Log.e(TAG, \"message\", e)\` in \`$file\`"
                fi

                # TODO/FIXME/HACK markers
                TODOS=$(grep -cE "TODO|FIXME|HACK|XXX" "$file" 2>/dev/null || echo 0)
                [ "$TODOS" -gt 0 ] && echo "ℹ️  $TODOS TODO/FIXME markers in $file" >> analysis.md

                # Deprecated Android APIs
                if grep -nE "@SuppressWarnings\(\"deprecation\"\)|\.getText\(\)|getColor\(R\." "$file" 2>/dev/null | grep -v "//" | head -3; then
                  echo "⚠️  Deprecated API usage in $file" >> analysis.md
                fi
              fi
            fi

            # ── XML manifest checks ──
            if [[ "$file" == *AndroidManifest.xml ]]; then
              if [ -f "$file" ]; then
                echo "### Manifest: $file" >> analysis.md
                if grep -q "android:debuggable=\"true\"" "$file"; then
                  FINDINGS="$FINDINGS\n- **$file**: \`android:debuggable=\"true\"\` in manifest — REMOVE for release"
                  FIXES="$FIXES\n- Remove \`android:debuggable=\"true\"\` from AndroidManifest or let build system control it"
                  SEVERITY="fail"
                fi
                if grep -q "android:allowBackup=\"true\"\|android:allowBackup=\"\"" "$file"; then
                  echo "⚠️  android:allowBackup=true — consider disabling for security" >> analysis.md
                fi
              fi
            fi

          done <<< "$CHANGED"

          # Write outputs
          {
            echo "findings<<EOF"
            printf '%b' "$FINDINGS"
            echo ""
            echo "EOF"
          } >> $GITHUB_OUTPUT

          {
            echo "fixes<<EOF"
            printf '%b' "$FIXES"
            echo ""
            echo "EOF"
          } >> $GITHUB_OUTPUT

          echo "severity=$SEVERITY" >> $GITHUB_OUTPUT

      - name: Upload Analysis
        uses: actions/upload-artifact@v4
        with:
          name: quick-analysis
          path: analysis.md

  # ──────────────────────────────────────────────
  # DEPENDENCY GRAPH DIFF  (what changed in deps?)
  # ──────────────────────────────────────────────
  dep-graph-diff:
    name: Dependency Graph Diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Check Dependency Changes
        shell: bash
        run: |
          echo "# Dependency Changes in This PR" > dep_diff.md

          # Detect added/removed dependencies
          BASE="${{ github.base_ref }}"
          git fetch origin "$BASE" --depth=1 2>/dev/null || true

          echo "## Changed build.gradle files" >> dep_diff.md
          git diff "origin/$BASE...HEAD" -- '*.gradle' >> dep_diff.md 2>/dev/null \
            || git diff HEAD~1 -- '*.gradle' >> dep_diff.md 2>/dev/null \
            || echo "No .gradle changes detected" >> dep_diff.md

          echo "## New Dependencies Added" >> dep_diff.md
          git diff "origin/$BASE...HEAD" -- '*.gradle' 2>/dev/null \
            | grep '^+' | grep 'implementation\|api\|testImplementation' \
            | grep -v '++' >> dep_diff.md \
            || echo "None" >> dep_diff.md

          echo "## Removed Dependencies" >> dep_diff.md
          git diff "origin/$BASE...HEAD" -- '*.gradle' 2>/dev/null \
            | grep '^-' | grep 'implementation\|api\|testImplementation' \
            | grep -v '\-\-' >> dep_diff.md \
            || echo "None" >> dep_diff.md

          cat dep_diff.md

      - name: Upload Dep Diff
        uses: actions/upload-artifact@v4
        with:
          name: dep-diff
          path: dep_diff.md

  # ──────────────────────────────────────────────
  # POST PR COMMENT WITH ALL FINDINGS
  # ──────────────────────────────────────────────
  post-pr-review:
    name: Post PR Review Comment
    runs-on: ubuntu-latest
    needs: [ quick-analysis, dep-graph-diff ]
    if: github.event_name == 'pull_request'
    steps:
      - name: Post NasTech Bot Review
        uses: actions/github-script@v7
        with:
          script: |
            const severity = `${{ needs.quick-analysis.outputs.severity }}`;
            const findings = `${{ needs.quick-analysis.outputs.findings }}`;
            const fixes    = `${{ needs.quick-analysis.outputs.fixes }}`;

            const icon = s => ({ pass: '✅', warn: '⚠️', fail: '❌' }[s] || '⚠️');
            const sha = context.payload.pull_request.head.sha.substring(0, 7);

            const sections = [];

            sections.push(`## 🤖 NasTech Bot — PR Analysis (${sha})`);
            sections.push('');
            sections.push(`**Overall:** ${icon(severity)} \`${severity}\``);
            sections.push('');

            if (findings && findings.trim()) {
              sections.push('### 🔍 Findings');
              sections.push(findings.trim());
              sections.push('');
            } else {
              sections.push('### 🔍 Findings');
              sections.push('✅ No issues detected in changed files.');
              sections.push('');
            }

            if (fixes && fixes.trim()) {
              sections.push('### 🔧 Auto-Fix Suggestions');
              sections.push(fixes.trim());
              sections.push('');
            }

            sections.push('### 📋 Checklist');
            sections.push('- [ ] No hardcoded secrets or credentials');
            sections.push('- [ ] No deprecated Gradle configurations');
            sections.push('- [ ] No `android:debuggable=true` in manifest');
            sections.push('- [ ] Dependencies pinned to stable versions');
            sections.push('- [ ] All modules compile successfully');
            sections.push('- [ ] Tests pass');
            sections.push('');
            sections.push('---');
            sections.push('*NasTech Bot · Run `nastech verify` locally before merging*');

            const body = sections.join('\n');

            // Delete previous bot comment if exists (keep PR clean)
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            for (const c of comments.data) {
              if (c.user.login === 'github-actions[bot]' && c.body.includes('NasTech Bot')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Fail on Critical Findings
        if: needs.quick-analysis.outputs.severity == 'fail'
        run: |
          echo "❌ Critical issues found — PR blocked. See bot comment for details."
          exit 1

  # ──────────────────────────────────────────────
  # DAILY DIGEST  (scheduled 09:00 UTC)
  # ──────────────────────────────────────────────
  daily-digest:
    name: Daily AI Digest
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.action == 'digest'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests --quiet
      - name: Send Daily Digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/guardian/notify_bot.py --daily-digest

  # ──────────────────────────────────────────────
  # BOT SYNTAX TEST  (on every workflow_dispatch)
  # ──────────────────────────────────────────────
  test-bot:
    name: Validate Bot Config
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'test' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Syntax check
        run: |
          python3 -m py_compile scripts/telegram_bot/nastech_guardian_bot.py
          python3 -m py_compile scripts/guardian/ai_coordinator.py
          echo "✅ All bot Python files OK"
      - name: Test AI keys
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python3 - << 'EOF'
          import os, json, urllib.request, urllib.error
          def test(name, url, headers, data):
              try:
                  req = urllib.request.Request(url, data=json.dumps(data).encode(), method='POST', headers=headers)
                  with urllib.request.urlopen(req, timeout=15) as r:
                      return True
              except Exception as e:
                  print(f"  {name}: {e}")
                  return False
          key = os.environ.get("GROQ_API_KEY","")
          if key:
              ok = test("Groq","https://api.groq.com/openai/v1/chat/completions",
                  {"Authorization":f"Bearer {key}","Content-Type":"application/json"},
                  {"model":"llama-3.3-70b-versatile","messages":[{"role":"user","content":"ok"}],"max_tokens":3})
              print(f"{'✅' if ok else '❌'} Groq API")
          key = os.environ.get("OPENROUTER_API_KEY","")
          if key:
              ok = test("OpenRouter","https://openrouter.ai/api/v1/chat/completions",
                  {"Authorization":f"Bearer {key}","Content-Type":"application/json","HTTP-Referer":"https://github.com/nastech-ai/NasTerminal","X-Title":"NasTech"},
                  {"model":"meta-llama/llama-3.3-70b-instruct","messages":[{"role":"user","content":"ok"}],"max_tokens":3})
              print(f"{'✅' if ok else '❌'} OpenRouter API")
          EOF
      - name: Notify Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - << 'EOF'
          import os, json, urllib.request
          token   = os.environ.get("TELEGRAM_BOT_TOKEN","")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID","")
          if not token or not chat_id: exit(0)
          msg = (
              "🛡️ <b>NasTech Guardian Bot v2.0 — Test ✅</b>\n\n"
              "All systems verified:\n"
              "• Bot syntax: <code>OK</code>\n"
              "• GitHub Secrets: loaded\n"
              "• AI APIs: tested\n\n"
              "Run on Termux:\n"
              "<code>bash scripts/termux_install.sh</code>"
          )
          data = json.dumps({"chat_id":chat_id,"text":msg,"parse_mode":"HTML"}).encode()
          urllib.request.urlopen(
              urllib.request.Request(f"https://api.telegram.org/bot{token}/sendMessage",
                  data=data, headers={"Content-Type":"application/json"}), timeout=10)
          print("✅ Telegram test message sent")
          EOF
